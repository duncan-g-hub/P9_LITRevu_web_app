{% extends 'base.html' %}
{% block content %}

    <h2>Connectez-vous</h2>
    <p>{{ message }}</p>
    <form action="" method="post">
        {{ form.as_p }}
        {% csrf_token %}
        <button type="submit">Se connecter</button>
    </form>

    <h2>Inscrivez-vous maintenant</h2>
    <form action="{% url 'signup' %}">
        <button type="submit">S'inscrire</button>
    </form>
{% endblock content %}
