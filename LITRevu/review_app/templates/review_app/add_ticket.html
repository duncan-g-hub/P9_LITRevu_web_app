{% extends 'base.html' %}

{% block content %}

    <h2>Créer un ticket</h2>

    <form class="post_form" action="" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}

        <button class="action_button" type="submit">Envoyer</button>
    </form>

    <form action="{% url 'feed' %}" >
        <button class="action_button" type="submit">Retour</button>
    </form>

{% endblock content %}
