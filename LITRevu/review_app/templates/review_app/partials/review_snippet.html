

{% if review.author == request.user %}
    <p>Vous avez publié une critique</p>
{% else %}
    <p>{{ review.author }} a publié une critique</p>
{% endif %}


<p class="date">{{ review.time_created }}</p>
<p class="title">{{ review.headline }} - {{ review.rating }} / 5</p>
<p>{{ review.body }}</p>
