{% extends 'base.html' %}

{% block content %}

    <h2>Supprimer un ticket</h2>

    <form action="" method="post">
        {% csrf_token %}
        <p>Etes-vous sûre de vouloir supprimer le ticket '{{ ticket.title }}' ?</p>
        <div class="action_button">
            <button type="submit">Supprimer</button>
            <a href="{% url 'posts' %}"><button type="button">Retour</button></a>
        </div>
    </form>


{% endblock content %}
