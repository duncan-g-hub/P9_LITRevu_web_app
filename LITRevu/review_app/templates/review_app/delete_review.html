{% extends 'base.html' %}

{% block content %}

    <h2>Supprimer une critique</h2>

    <form action="" method="post">
        {% csrf_token %}
        <p>Etes-vous sûre de vouloir supprimer la critique '{{ review.headline }}' ?</p>
        <button class="action_button" type="submit">Supprimer</button>
    </form>

    <form action="{% url 'posts' %}" >
        <button class="action_button" type="submit">Retour</button>
    </form>


{% endblock content %}
