{% extends 'base.html' %}

{% block content %}

    <h2>Supprimer une critique</h2>

    <form action="" method="post">
        {% csrf_token %}
        <p>Etes-vous sûre de vouloir supprimer la critique '{{ review.headline }}' ?</p>
        <div class="action_button">
            <button type="submit">Supprimer</button>
            <a href="{% url 'posts' %}"><button type="button">Retour</button></a>
        </div>
    </form>



{% endblock content %}
