{% extends 'base.html' %}

{% block content %}

    <h2>Créer une critique</h2>


    <form class="post_form" action="" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <h3>Vous êtes en train de poster en réponse à </h3>
        <div class="post">
            {% include 'review_app/partials/ticket_snippet.html'  with ticket=context.ticket %}
        </div>
        <h3>Critique</h3>
        {{ context.review_form.as_p }}
        <div class="action_button">
            <button type="submit">Ajouter</button>
            <a href="{% url 'feed' %}"><button type="button">Retour</button></a>
        </div>
    </form>

{% endblock content %}
